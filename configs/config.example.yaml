paths:
  artifacts_dir: artifacts
  logs_dir: artifacts/logs
  output_dir: artifacts/output

openai:
  base_url: http://127.0.0.1:11434/v1
  model: qwen3.5:9b
  api_key: ollama
  temperature: 0.6
  max_tokens: 512
  timeout_sec: 60
  # 附加请求字段，原样并入 /chat/completions 请求体（按需增删）。
  # 思考型模型（如 qwen3.5）需要关掉思考，否则 content 为空且首字延迟极高。
  extra_body:
    reasoning_effort: none

wake:
  enabled: true
  mode: service
  url: ws://127.0.0.1:8766/v1/wake/ws
  auto_start_listening: true
  trigger_words: ["小元", "你好小元"]

stt:
  enabled: true
  mode: service
  url: ws://127.0.0.1:8790/v1/stt/ws
  auto_start_listening: true
  final_events_only: true

tts:
  enabled: true
  mode: service
  url: ws://127.0.0.1:8787/v1/tts/ws
  speaker:
  speaker_id:
  speed: 1.0
  save_last_response_wav: false

duplex:
  start_mode: wake
  allow_barge_in: true
  cancel_tts_on_user_speech: true
  end_session_words: ["退出", "停止聊天", "再见"]
  system_prompt: >
    你是一个运行在本地电脑上的中文实时语音助手。
    回答要自然、简洁、适合直接朗读。需要写代码时保持清晰严谨。
  max_history_turns: 8
  # 会话结束后回到待唤醒状态（随时可再次唤醒），而不是退出程序
  loop_forever: true
  # 对话中连续无语音超过该秒数自动回到待唤醒；0 表示禁用
  idle_timeout_sec: 60
  # 唤醒成功后播报的应答语；留空则不播报
  wake_ack_text: "我在"
  # 重新唤醒开启新会话时是否清空对话历史
  reset_history_per_session: false

runtime:
  log_level: INFO
  health_timeout_sec: 5
  mock_text_inputs: []
  # WebSocket 断开后的重连退避（秒），指数增长到最大值
  reconnect_initial_delay_sec: 1
  reconnect_max_delay_sec: 30

supervisor:
  # chatcaht run 模式下自动拉起并守护 WakeUp/SpText/GVoice
  manage_services: true
  # 会话崩溃后的重启退避（秒）
  restart_delay_sec: 2
  max_restart_delay_sec: 60
  # 会话稳定运行超过该秒数后重置重启退避
  stable_run_sec: 300
  # 周期健康检查间隔（秒），不健康的服务会被自动重启
  health_check_interval_sec: 30

services:
  uv_executable: uv
  wakeup_dir: ../WakeUp
  wakeup_config: configs/config.yaml
  sptext_dir: ../SpText
  sptext_config: configs/config.example.yaml
  gvoice_dir: ../GVoice
  gvoice_config: configs/config.yaml
  startup_timeout_sec: 20
