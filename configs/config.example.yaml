paths:
  artifacts_dir: artifacts
  logs_dir: artifacts/logs
  output_dir: artifacts/output
  metrics_file: artifacts/metrics/turns.jsonl

openai:
  base_url: http://127.0.0.1:1234/v1
  model: qwen/qwen3.5-9b
  api_key: lm-studio
  temperature: 0.6
  max_tokens: 120
  timeout_sec: 60
  # 附加请求字段，原样并入 /chat/completions 请求体（按需增删）。
  # 思考型模型（如 qwen3.5）需要关掉思考，否则 content 为空且首字延迟极高。
  extra_body:
    reasoning_effort: none

llm:
  # 回复由谁生成：
  #   openai  —— 直连 LM Studio（上面的 openai: 段）
  #   lollama —— 经 LoLLama 智能体服务（分层记忆 + 工具调用，再由它请求 LM Studio）
  provider: openai

lollama:
  url: ws://127.0.0.1:8801/v1/llm/ws
  # 单条回复的整体超时（秒）；含工具调用耗时
  response_timeout_sec: 180
  # 把 LoLLama 的状态钩子（"我算一下""让我想想"等）送 TTS 播报；
  # 各阶段的播报文案在 LoLLama 侧 configs/config.yaml 的 status.announce 段配置
  announce_status: true

wake:
  enabled: true
  mode: service
  url: ws://127.0.0.1:8766/v1/wake/ws
  auto_start_listening: true
  input_mode: external_pcm
  trigger_words: ["小元", "你好小元"]

stt:
  enabled: true
  mode: service
  url: ws://127.0.0.1:8790/v1/stt/ws
  auto_start_listening: true
  input_mode: external_pcm
  final_events_only: true
  # Prefer SpText final events, but if the recognizer keeps streaming partials
  # without a final event, submit the last stable partial after this pause.
  # Keep this above normal pauses between words; small values can split one
  # sentence into many turns.
  partial_fallback_sec: 1.2
  partial_min_chars: 2

tts:
  enabled: true
  mode: service
  url: ws://127.0.0.1:8787/v1/tts/ws
  speaker:
  speaker_id:
  # 留空时使用 GVoice 后端/说话人配置的默认语速；小于 1 会更慢。
  speed:
  save_last_response_wav: false

audio:
  mode: unified_required
  url: ws://127.0.0.1:8810/v1/audio/ws
  device_sample_rate: 48000
  capture_sample_rate: 16000
  frame_ms: 10
  aec_tail_ms: 200
  barge_in_min_speech_ms: 120
  barge_in_preroll_ms: 200
  barge_in_hangover_ms: 300
  render_queue_ms: 500
  capture_queue_ms: 1000
  capture_stall_timeout_ms: 3000
  vad_aggressiveness: 2
  input_device:
  output_device:

duplex:
  start_mode: wake
  allow_barge_in: true
  cancel_tts_on_user_speech: true
  end_session_words: ["退出", "停止聊天", "再见", "拜拜", "闭嘴"]
  system_prompt: >
    你是一个运行在本地电脑上的中文实时语音助手。
    回答要自然、简洁、适合直接朗读。需要写代码时保持清晰严谨。
  # ChatCaht 直连 openai 时维护的短期对话窗口；provider=lollama 时 ChatCaht 只发当前文本
  max_history_turns: 8
  # 会话结束后回到待唤醒状态（随时可再次唤醒），而不是退出程序
  loop_forever: true
  # 对话中连续无语音超过该秒数自动回到待唤醒；0 表示禁用
  idle_timeout_sec: 60
  # 唤醒成功后播报的应答语；留空则不播报
  wake_ack_text: "我在"
  # 重新唤醒开启新会话时是否清空对话历史；provider=lollama 时同步 reset LoLLama 工作记忆
  reset_history_per_session: false
  tts_segment_min_chars: 6
  tts_segment_max_chars: 80
  tts_segment_flush_ms: 350

runtime:
  log_level: INFO
  health_timeout_sec: 5
  mock_text_inputs: []
  # WebSocket 断开后的重连退避（秒），指数增长到最大值
  reconnect_initial_delay_sec: 1
  reconnect_max_delay_sec: 30

supervisor:
  # chatcaht run 模式下自动拉起并守护 WakeUp/SpText/GVoice
  manage_services: true
  # 会话崩溃后的重启退避（秒）
  restart_delay_sec: 2
  max_restart_delay_sec: 60
  # 会话稳定运行超过该秒数后重置重启退避
  stable_run_sec: 300
  # 周期健康检查间隔（秒），不健康的服务会被自动重启
  health_check_interval_sec: 30

services:
  uv_executable: uv
  audio_runtime_dir: ../AudioRuntime
  audio_runtime_executable: build/Release/chat-audio-runtime.exe
  wakeup_dir: ../WakeUp
  wakeup_config: configs/config.yaml
  sptext_dir: ../SpText
  sptext_config: configs/config.example.yaml
  gvoice_dir: ../GVoice
  gvoice_config: configs/config.yaml
  lollama_dir: ../LoLLama
  lollama_config: configs/config.yaml
  audio_startup_timeout_sec: 30
  wake_startup_timeout_sec: 30
  stt_startup_timeout_sec: 30
  tts_startup_timeout_sec: 600
  llm_startup_timeout_sec: 60
