paths:
  artifacts_dir: artifacts
  logs_dir: artifacts/logs
  output_dir: artifacts/output

openai:
  base_url: http://127.0.0.1:1234/v1
  model: qwen/qwen3.5-9b
  api_key: lm-studio
  temperature: 0.6
  max_tokens: 120
  timeout_sec: 60
  # qwen3.5 是思考型模型：不关思考的话 content 一直为空、首字延迟 30s+，
  # 语音场景必须直接出正文
  extra_body:
    reasoning_effort: none

llm:
  # 回复由谁生成：
  #   openai  —— 直连 LM Studio（上面的 openai: 段）
  #   lollama —— 经 LoLLama 智能体服务（分层记忆 + 工具调用，再由它请求 LM Studio）
  provider: lollama

lollama:
  url: ws://127.0.0.1:8801/v1/llm/ws
  # 单条回复的整体超时（秒）；含工具调用耗时
  response_timeout_sec: 180
  # 把 LoLLama 的状态钩子（"我算一下""让我想想"等）送 TTS 播报；
  # 各阶段的播报文案在 LoLLama 侧 configs/config.yaml 的 status.announce 段配置
  announce_status: true

wake:
  enabled: true
  mode: service
  url: ws://127.0.0.1:8766/v1/wake/ws
  auto_start_listening: true
  trigger_words: ["小元", "你好小元"]

stt:
  enabled: true
  mode: service
  url: ws://127.0.0.1:8790/v1/stt/ws
  auto_start_listening: true
  final_events_only: true
  partial_fallback_sec: 1.2
  partial_min_chars: 2

tts:
  enabled: true
  mode: service
  url: ws://127.0.0.1:8787/v1/tts/ws
  speaker:
  speaker_id:
  speed: 0.85
  save_last_response_wav: false

duplex:
  start_mode: wake
  allow_barge_in: true
  cancel_tts_on_user_speech: true
  end_session_words: ["退出", "停止聊天", "再见", "拜拜", "闭嘴", "别说了", "不聊了", "不想聊了", "不想说了", "不想听了", "停止", "关闭", "结束", "结束会话", "结束对话", "结束聊天"]
  system_prompt: >
    你是一个运行在本地电脑上的中文实时语音助手。
    回答要自然、简洁、适合直接朗读。需要写代码时保持清晰严谨。
  # ChatCaht 直连 openai 时维护的短期对话窗口；provider=lollama 时 ChatCaht 只发当前文本
  max_history_turns: 8
  loop_forever: true
  idle_timeout_sec: 60
  wake_ack_text: "我在"
  # 重新唤醒开启新会话时是否清空对话历史；provider=lollama 时同步 reset LoLLama 工作记忆
  reset_history_per_session: false

runtime:
  log_level: INFO
  health_timeout_sec: 5
  mock_text_inputs: []
  reconnect_initial_delay_sec: 1
  reconnect_max_delay_sec: 30

supervisor:
  manage_services: true
  restart_delay_sec: 2
  max_restart_delay_sec: 60
  stable_run_sec: 300
  health_check_interval_sec: 30

services:
  uv_executable: uv
  wakeup_dir: ../WakeUp
  wakeup_config: configs/config.yaml
  sptext_dir: ../SpText
  sptext_config: configs/config.example.yaml
  gvoice_dir: ../GVoice
  gvoice_config: configs/config.yaml
  lollama_dir: ../LoLLama
  lollama_config: configs/config.yaml
  startup_timeout_sec: 20
